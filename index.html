<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KI.NEWS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #ededed;
      color: #18191d;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Karussell ── */
    .carousel-section {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 20px 0 10px;
    }

    .carousel-wrapper {
      position: relative;
      height: 170px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .carousel-track {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Karten — horizontal (Bild links, Text rechts) ── */
    .card {
      position: absolute;
      width: 560px;
      height: 150px;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 1px 3px rgba(24,25,29,0.06), 0 4px 16px rgba(24,25,29,0.08);
      text-decoration: none;
      color: #18191d;
      display: flex;
      flex-direction: row;
      will-change: transform, opacity, filter;
      border: 1px solid #e6e9f0;
    }

    .card[data-pos="0"]           { transform: translateX(0)     scale(1);    opacity: 1;    z-index: 5; filter: blur(0px); }
    .card[data-pos="1"]           { transform: translateX(430px)  scale(0.82); opacity: 0.55; z-index: 4; filter: blur(2px); }
    .card[data-pos="-1"]          { transform: translateX(-430px) scale(0.82); opacity: 0.55; z-index: 4; filter: blur(2px); }
    .card[data-pos="2"]           { transform: translateX(720px)  scale(0.65); opacity: 0.2;  z-index: 3; filter: blur(4px); }
    .card[data-pos="-2"]          { transform: translateX(-720px) scale(0.65); opacity: 0.2;  z-index: 3; filter: blur(4px); }
    .card[data-pos="hidden-right"]{ transform: translateX(900px)  scale(0.5);  opacity: 0;    z-index: 1; pointer-events: none; }
    .card[data-pos="hidden-left"] { transform: translateX(-900px) scale(0.5);  opacity: 0;    z-index: 1; pointer-events: none; }

    /* ── Bild (linke Seite) ── */
    .card-image {
      width: 195px;
      height: 150px;
      flex-shrink: 0;
      object-fit: cover;
      display: block;
    }

    .card-image-placeholder {
      width: 195px;
      height: 150px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      background: linear-gradient(135deg, #f3f3f9 0%, #e6e9f0 100%);
    }

    /* ── Text (rechte Seite) ── */
    .card-body {
      flex: 1;
      padding: 14px 18px 12px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-width: 0;
    }

    .card-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 5px;
      gap: 8px;
    }

    .card-category {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      padding: 2px 8px;
      border-radius: 4px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .card-date {
      font-size: 10px;
      color: #82889a;
      white-space: nowrap;
    }

    .card-source {
      font-size: 10px;
      color: #82889a;
      font-weight: 500;
      margin-bottom: 5px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.4;
      color: #18191d;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .card-cta {
      margin-top: 6px;
      font-size: 11px;
      color: #00acdc;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
      flex-shrink: 0;
    }
    .card[data-pos="0"]:hover .card-cta { opacity: 1; }

    /* ── Pfeile ── */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1.5px solid #e6e9f0;
      background: #ffffff;
      color: #484d59;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
      box-shadow: 0 1px 4px rgba(24,25,29,0.06);
    }
    .nav-arrow:hover { background: #00acdc; border-color: #00acdc; color: #ffffff; }
    .nav-prev { left: 12px; }
    .nav-next { right: 12px; }

    /* ── Fortschrittsbalken ── */
    .progress-bar { height: 2px; background: #d5d5d5; margin: 12px 24px 0; flex-shrink: 0; }
    .progress-fill { height: 100%; background: #00acdc; width: 0%; }

    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 170px;
      gap: 14px;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid #d5d5d5;
      border-top-color: #00acdc;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 12px; color: #82889a; }

    /* ── Empty / Error ── */
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 170px;
      font-size: 13px;
      color: #82889a;
    }
  </style>
</head>
<body>

  <div class="carousel-section">
    <div id="carousel-root">
      <div class="loading">
        <div class="spinner"></div>
        <p>Lade aktuelle News&hellip;</p>
      </div>
    </div>
    <div class="progress-bar" id="progress-bar" style="display:none">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
  </div>

  <script>
    const SOURCES = [
      // KI & Tech — DACH
      { name: 'Heise Online',         url: 'https://www.heise.de/thema/Kuenstliche-Intelligenz.xml',                  category: 'KI & Tech' },
      { name: 't3n',                  url: 'https://t3n.de/tag/kuenstliche-intelligenz/rss.xml',                      category: 'KI & Tech' },
      { name: 'Golem.de',             url: 'https://www.golem.de/rss.php?feed=ATOM1.0',                               category: 'KI & Tech' },
      { name: 'Google Deutschland',   url: 'https://blog.google/intl/de-de/feed/',                                   category: 'KI & Tech' },
      { name: 'Microsoft DE',         url: 'https://news.microsoft.com/de-de/tag/agents/feed/',                       category: 'KI & Tech' },
      { name: 'ZDNet DE',             url: 'https://www.zdnet.de/feed/',                                             category: 'KI & Tech' },
      { name: 'Computerwoche',        url: 'https://www.computerwoche.de/a/rss.xml',                                  category: 'KI & Tech' },
      { name: 'Gründerszene',         url: 'https://www.gruenderszene.de/feed/',                                     category: 'KI & Tech' },
      { name: 'futurezone.at',        url: 'https://futurezone.at/rss/tech',                                         category: 'KI & Tech' },
      { name: 'netzpolitik.org',      url: 'https://netzpolitik.org/feed/',                                          category: 'KI & Tech' },
      { name: 'WirtschaftsWoche Tech',url: 'https://www.wiwo.de/themen/digitale-welt/rss',                           category: 'KI & Tech' },
      { name: 'Handelsblatt Tech',    url: 'https://www.handelsblatt.com/rss/technologie',                           category: 'KI & Tech' },
      // Finance & Banking
      { name: 'IT Finanzmagazin',     url: 'https://www.it-finanzmagazin.de/tag/kuenstliche-intelligenz/feed/',       category: 'Finance & Banking' },
      { name: 'IT Finanzmagazin KI',  url: 'https://www.it-finanzmagazin.de/tag/ki/feed/',                           category: 'Finance & Banking' },
      { name: 'Der Bank Blog',        url: 'https://www.der-bank-blog.de/stichwort/kuenstliche-intelligenz/feed/',    category: 'Finance & Banking' },
      { name: 'Finance Forward',      url: 'https://financeforward.de/feed/',                                        category: 'Finance & Banking' },
      { name: 'Payment & Banking',    url: 'https://paymentandbanking.com/feed/',                                    category: 'Finance & Banking' },
      { name: 'BankingHub',           url: 'https://www.bankinghub.eu/feed/',                                        category: 'Finance & Banking' },
      { name: 'finews.ch',            url: 'https://www.finews.ch/rss/',                                             category: 'Finance & Banking' },
      { name: 'Gründerszene Fintech', url: 'https://www.gruenderszene.de/feed/?cat=fintech',                         category: 'Finance & Banking' },
      { name: 'WirtschaftsWoche KI',  url: 'https://www.wiwo.de/themen/kuenstliche-intelligenz/rss',                 category: 'Finance & Banking' },
      // Marketing, Vertrieb & Service
      { name: 'HubSpot Marketing',    url: 'https://blog.hubspot.de/marketing/rss.xml',                              category: 'Marketing, Vertrieb & Service' },
      { name: 'HubSpot Sales',        url: 'https://blog.hubspot.de/sales/rss.xml',                                  category: 'Marketing, Vertrieb & Service' },
      { name: 'HubSpot Service',      url: 'https://blog.hubspot.de/service/rss.xml',                                category: 'Marketing, Vertrieb & Service' },
      { name: 'OMR',                  url: 'https://omr.com/de/daily/feed/',                                         category: 'Marketing, Vertrieb & Service' },
      { name: 'OnlineMarketing.de',   url: 'https://onlinemarketing.de/feed/',                                       category: 'Marketing, Vertrieb & Service' },
      { name: 'W&V',                  url: 'https://www.wuv.de/rss/alle-news.xml',                                   category: 'Marketing, Vertrieb & Service' },
      { name: 'Absatzwirtschaft',     url: 'https://www.absatzwirtschaft.de/feed/',                                  category: 'Marketing, Vertrieb & Service' },
      { name: 'meedia',               url: 'https://meedia.de/feed/',                                                category: 'Marketing, Vertrieb & Service' },
      { name: 'Horizont',             url: 'https://www.horizont.net/rss/',                                          category: 'Marketing, Vertrieb & Service' },
    ];

    const COLORS = {
      'KI & Tech':                    { bg: 'rgba(0,172,220,0.10)',  text: '#00acdc' },
      'Finance & Banking':            { bg: 'rgba(0,172,220,0.10)',  text: '#00acdc' },
      'Marketing, Vertrieb & Service':{ bg: 'rgba(0,172,220,0.10)',  text: '#00acdc' },
    };

    const EMOJI = {
      'KI & Tech':                    '🤖',
      'Finance & Banking':            '📊',
      'Marketing, Vertrieb & Service':'📣',
    };

    const PROXIES = [
      url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
      url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
      url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
    ];

    const AUTO_SECS = 7;

    let allArticles      = [];
    let filteredArticles = [];
    let currentIndex     = 0;
    let autoTimer        = null;

    const AI_KEYWORDS = [
      'künstliche intelligenz','maschinelles lernen','sprachmodell','chatbot','automatisierung',
      'generative ki','ki-','deep learning','neuronale','digitale transformation',
      'ki-assistent','ki-agent','ki-tool','ki-plattform','ki-modell',
      'chatgpt','gpt-4','gpt-5','copilot','gemini','llama','mistral','grok','claude','perplexity',
      'openai','anthropic','deepmind','hugging face','stability ai','cohere','xai','mistral ai',
      'artificial intelligence','machine learning','large language model','llm','gpt-',
      'generative ai','foundation model','transformer','neural network','agentic',
      'ai agent','ai tool','ai model','ai platform','ai safety','prompt','fine-tune',
      'automation','rpa','intelligent automation','conversational ai',
    ];

    const CORE_KEYWORDS = [
      'künstliche intelligenz','maschinelles lernen','sprachmodell','chatbot','chatgpt',
      'openai','anthropic','deepmind','llm','gpt-4','gpt-5','large language model',
      'generative ai','generative ki','artificial intelligence','machine learning',
      'deep learning','copilot','gemini','llama','mistral','grok','claude',
      'transformer','neural network','prompt engineering',
    ];

    function isRelevant(art) {
      const title   = art.title.toLowerCase();
      const excerpt = art.excerpt.toLowerCase();
      if (/\bki\b/.test(title) || /\bai\b/.test(title)) return true;
      if (AI_KEYWORDS.some(kw => title.includes(kw))) return true;
      if (/\bki\b/.test(excerpt) || /\bai\b/.test(excerpt)) return true;
      if (CORE_KEYWORDS.some(kw => excerpt.includes(kw))) return true;
      return false;
    }

    function stripHtml(html) {
      return html.replace(/<[^>]*>/g, '').replace(/&[a-z#0-9]+;/gi, ' ').replace(/\s+/g, ' ').trim();
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function parseRSS(xmlText) {
      try {
        const doc   = new DOMParser().parseFromString(xmlText, 'text/xml');
        const items = [...doc.querySelectorAll('item, entry')].slice(0, 3);
        return items.map(item => {
          const get = s => { const e = item.querySelector(s); return e ? e.textContent.trim() : ''; };
          const linkEl = item.querySelector('link');
          const link   = (linkEl && linkEl.getAttribute('href')) || (linkEl && linkEl.textContent.trim()) || '';
          const rawDate = get('pubDate') || get('published') || get('updated');
          const date    = rawDate ? new Date(rawDate) : new Date();
          const thumbEl  = item.querySelector('[url]');
          const encEl    = item.querySelector('enclosure');
          const content  = get('encoded') || get('content') || get('description') || get('summary') || '';
          const imgMatch = content.match(/<img[^>]+src=["']([^"'> ]+)["']/);
          const image    =
            (thumbEl && thumbEl.getAttribute('url')) ||
            (encEl && /image/.test(encEl.getAttribute('type') || '') && encEl.getAttribute('url')) ||
            (imgMatch && imgMatch[1]) || '';
          const excerpt = stripHtml(get('description') || get('summary') || '').slice(0, 180);
          return { title: get('title'), link, image, date, excerpt };
        }).filter(a => a.title && a.link);
      } catch (e) { return []; }
    }

    async function tryFetch(feedUrl) {
      for (const makeProxy of PROXIES) {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), 9000);
        try {
          const res  = await fetch(makeProxy(feedUrl), { signal: ctrl.signal });
          clearTimeout(tid);
          if (!res.ok) continue;
          const text = await res.text();
          if (text && (text.includes('<item>') || text.includes('<entry>') || text.includes('<rss') || text.includes('<feed'))) return text;
        } catch { clearTimeout(tid); }
      }
      return null;
    }

    async function fetchSource(source) {
      const text = await tryFetch(source.url);
      if (!text) return [];
      return parseRSS(text)
        .map(a => ({ ...a, source: source.name, category: source.category }))
        .filter(a => a.image && a.image.trim() !== '');
    }

    async function loadAll() {
      // Zuerst KI-gefilterte Liste laden (wöchentlich von GitHub Actions aktualisiert)
      try {
        const res = await fetch('./articles.json?t=' + Date.now());
        if (res.ok) {
          const data = await res.json();
          if (data.articles && data.articles.length > 0) {
            allArticles = data.articles.map(a => ({ ...a, date: new Date(a.date) }));
            renderCarousel();
            return;
          }
        }
      } catch (e) { /* Fallback auf Live-RSS */ }

      // Fallback: Live-RSS
      const results = await Promise.allSettled(SOURCES.map(fetchSource));
      allArticles = results
        .filter(r => r.status === 'fulfilled')
        .flatMap(r => r.value)
        .sort((a, b) => b.date - a.date)
        .slice(0, 25);

      if (allArticles.length === 0) {
        document.getElementById('carousel-root').innerHTML = `
          <div class="empty-state" style="flex-direction:column;gap:14px;text-align:center">
            <div style="font-size:28px">⚠️</div>
            <div style="color:#82889a">Artikel konnten nicht geladen werden.</div>
            <button onclick="location.reload()"
              style="padding:7px 18px;border:1.5px solid #00acdc;background:transparent;color:#00acdc;border-radius:20px;cursor:pointer;font-size:12px;font-family:inherit">
              Neu laden
            </button>
          </div>`;
        return;
      }
      renderCarousel();
    }

    function fmtDate(d) {
      const h = Math.floor((Date.now() - d) / 3_600_000);
      if (h < 1)  return 'Gerade eben';
      if (h < 24) return `vor ${h} Std.`;
      const days = Math.floor(h / 24);
      if (days < 7) return `vor ${days} Tag${days > 1 ? 'en' : ''}`;
      return d.toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });
    }

    function getPos(idx) {
      const total = allArticles.length;
      let diff = idx - currentIndex;
      if (diff >  total / 2) diff -= total;
      if (diff < -total / 2) diff += total;
      if (diff ===  0) return '0';
      if (diff ===  1) return '1';
      if (diff === -1) return '-1';
      if (diff ===  2) return '2';
      if (diff === -2) return '-2';
      return diff > 0 ? 'hidden-right' : 'hidden-left';
    }

    function renderCarousel() {
      const root = document.getElementById('carousel-root');
      if (!allArticles.length) {
        root.innerHTML = '<div class="empty-state">Keine Artikel verfügbar.</div>';
        return;
      }

      const cards = allArticles.map((art, i) => {
        const pos   = getPos(i);
        const col   = COLORS[art.category] || COLORS['KI & Tech'];
        const emoji = EMOJI[art.category]  || '📄';
        const imgTag = art.image
          ? `<img class="card-image" src="${escHtml(art.image)}" alt="" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : '';
        const phStyle = art.image ? 'display:none' : '';

        return `
<a class="card" data-pos="${pos}" data-index="${i}" href="${escHtml(art.link)}" target="_blank" rel="noopener"
   onclick="handleCardClick(event,${i})">
  ${imgTag}
  <div class="card-image-placeholder" style="${phStyle}">${emoji}</div>
  <div class="card-body">
    <div class="card-top-row">
      <span class="card-category" style="background:${col.bg};color:${col.text}">${escHtml(art.category)}</span>
      <span class="card-date">${fmtDate(art.date)}</span>
    </div>
    <div class="card-source">${escHtml(art.source)}</div>
    <h2 class="card-title">${escHtml(art.title)}</h2>
    <div class="card-cta">Weiterlesen &rarr;</div>
  </div>
</a>`;
      }).join('');

      root.innerHTML = `
<div class="carousel-wrapper">
  <button class="nav-arrow nav-prev" aria-label="Zurück" onclick="navigate(-1)">&#8592;</button>
  <div class="carousel-track">${cards}</div>
  <button class="nav-arrow nav-next" aria-label="Weiter" onclick="navigate(1)">&#8594;</button>
</div>`;

      document.getElementById('progress-bar').style.display = 'block';
      startProgress();
      startAuto();
    }

    function updatePositions() {
      document.querySelectorAll('.card').forEach(card => {
        card.dataset.pos = getPos(parseInt(card.dataset.index));
      });
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + allArticles.length) % allArticles.length;
      updatePositions();
      startProgress();
      restartAuto();
    }

    function handleCardClick(e, idx) {
      if (idx !== currentIndex) {
        e.preventDefault();
        currentIndex = idx;
        updatePositions();
        startProgress();
        restartAuto();
      }
    }

    function startAuto()   { clearInterval(autoTimer); autoTimer = setInterval(() => navigate(1), AUTO_SECS * 1000); }
    function restartAuto() { clearInterval(autoTimer); autoTimer = setInterval(() => navigate(1), AUTO_SECS * 1000); }

    function startProgress() {
      const fill = document.getElementById('progress-fill');
      if (!fill) return;
      fill.style.transition = 'none';
      fill.style.width = '0%';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        fill.style.transition = `width ${AUTO_SECS}s linear`;
        fill.style.width = '100%';
      }));
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft')  navigate(-1);
    });

    let _touchX = 0;
    document.addEventListener('touchstart', e => { _touchX = e.touches[0].clientX; });
    document.addEventListener('touchend',   e => {
      const dx = _touchX - e.changedTouches[0].clientX;
      if (Math.abs(dx) > 50) navigate(dx > 0 ? 1 : -1);
    });

    loadAll();
    setInterval(loadAll, 24 * 60 * 60 * 1000);
  </script>
</body>
</html>
