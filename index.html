<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KI.NEWS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: #ededed;
      color: #18191d;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Abschnitts-Titel (wie "Module" in 360L) ── */
    .section-header {
      display: flex;
      align-items: center;
      padding: 18px 24px 0;
      flex-shrink: 0;
    }

    .section-title {
      font-size: 16px;
      font-weight: 700;
      color: #18191d;
      letter-spacing: -0.1px;
    }

    /* ── Filter Buttons (Pill-Form) ── */
    .filters {
      display: flex;
      gap: 8px;
      padding: 14px 24px;
      background: #ededed;
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
      justify-content: center;
    }
    .filters::-webkit-scrollbar { display: none; }

    .filter-btn {
      padding: 6px 16px;
      border: 1.5px solid #c7c9d1;
      border-radius: 20px;
      background: #ffffff;
      color: #484d59;
      font-size: 12px;
      font-weight: 600;
      font-family: 'Plus Jakarta Sans', sans-serif;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.18s;
    }
    .filter-btn:hover { background: #f0f0f0; }
    .filter-btn.active { background: #3cd4ff; color: #18191d; }

    /* ── Karussell ── */
    .carousel-section {
      position: relative;
      padding: 16px 0 10px;
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
    }

    .carousel-wrapper {
      position: relative;
      height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .carousel-track {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Karten ── */
    .card {
      position: absolute;
      width: 290px;
      height: 340px;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      box-shadow: 0 1px 3px rgba(24,25,29,0.06), 0 4px 16px rgba(24,25,29,0.08);
      text-decoration: none;
      color: #18191d;
      display: block;
      will-change: transform, opacity, filter;
      border: 1px solid #e6e9f0;
    }

    .card[data-pos="0"]           { transform: translateX(0)     scale(1);    opacity: 1;    z-index: 5; filter: blur(0px); }
    .card[data-pos="1"]           { transform: translateX(262px)  scale(0.80); opacity: 0.65; z-index: 4; filter: blur(2px); }
    .card[data-pos="-1"]          { transform: translateX(-262px) scale(0.80); opacity: 0.65; z-index: 4; filter: blur(2px); }
    .card[data-pos="2"]           { transform: translateX(460px)  scale(0.62); opacity: 0.32; z-index: 3; filter: blur(5px); }
    .card[data-pos="-2"]          { transform: translateX(-460px) scale(0.62); opacity: 0.32; z-index: 3; filter: blur(5px); }
    .card[data-pos="hidden-right"]{ transform: translateX(650px)  scale(0.5);  opacity: 0;    z-index: 1; pointer-events: none; }
    .card[data-pos="hidden-left"] { transform: translateX(-650px) scale(0.5);  opacity: 0;    z-index: 1; pointer-events: none; }

    .card-image {
      width: 100%;
      height: 150px;
      object-fit: cover;
      display: block;
      background: #f3f3f9;
    }

    .card-image-placeholder {
      width: 100%;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      background: linear-gradient(135deg, #f3f3f9 0%, #e6e9f0 100%);
    }

    .card-body {
      padding: 14px 18px 12px;
      height: calc(340px - 150px);
      display: flex;
      flex-direction: column;
    }

    .card-top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .card-category {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 4px;
    }

    .card-date { font-size: 11px; color: #82889a; }

    .card-source {
      font-size: 11px;
      color: #82889a;
      font-weight: 500;
      margin-bottom: 6px;
    }

    .card-title {
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 15px;
      font-weight: 700;
      line-height: 1.4;
      color: #18191d;
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      line-clamp: 3;
      -webkit-box-orient: vertical;
    }

    .card-cta {
      margin-top: 8px;
      font-size: 12px;
      color: #00acdc;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .card[data-pos="0"]:hover .card-cta { opacity: 1; }

    /* ── Pfeile ── */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1.5px solid #e6e9f0;
      background: #ffffff;
      color: #484d59;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
      box-shadow: 0 1px 4px rgba(24,25,29,0.06);
    }
    .nav-arrow:hover { background: #00acdc; border-color: #00acdc; color: #ffffff; }
    .nav-prev { left: 12px; }
    .nav-next { right: 12px; }

    /* ── Fortschrittsbalken ── */
    .progress-bar { height: 2px; background: #e6e9f0; margin: 10px 24px 0; flex-shrink: 0; }
    .progress-fill { height: 100%; background: #00acdc; width: 0%; }

    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 360px;
      gap: 18px;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #e6e9f0;
      border-top-color: #00acdc;
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-size: 13px; color: #82889a; }

    /* ── Empty / Error ── */
    .empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 360px;
      font-size: 14px;
      color: #82889a;
    }
  </style>

    function isRelevant(art) {
      const title   = art.title.toLowerCase();
      const excerpt = art.excerpt.toLowerCase();
      if (/\bki\b/.test(title) || /\bai\b/.test(title)) return true;
      if (AI_KEYWORDS.some(kw => title.includes(kw))) return true;
      if (/\bki\b/.test(excerpt) || /\bai\b/.test(excerpt)) return true;
      if (CORE_KEYWORDS.some(kw => excerpt.includes(kw))) return true;
      return false;

    function stripHtml(html) {
      return html.replace(/<[^>]*>/g, '').replace(/&[a-z#0-9]+;/gi, ' ').replace(/\s+/g, ' ').trim();

      return String(str)

        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

      try {
        const doc   = new DOMParser().parseFromString(xmlText, 'text/xml');
        const items = [...doc.querySelectorAll('item, entry')].slice(0, 3);
        return items.map(item => {
          const get = s => { const e = item.querySelector(s); return e ? e.textContent.trim() : ''; };
          const linkEl = item.querySelector('link');
          const link   = (linkEl && linkEl.getAttribute('href')) || (linkEl && linkEl.textContent.trim()) || '';
          const rawDate = get('pubDate') || get('published') || get('updated');
          const date    = rawDate ? new Date(rawDate) : new Date();
          const thumbEl  = item.querySelector('[url]');
          const encEl    = item.querySelector('enclosure');
          const content  = get('encoded') || get('content') || get('description') || get('summary') || '';
          const imgMatch = content.match(/<img[^>]+src=["']([^"'> ]+)["']/);
          const image    =
            (thumbEl && thumbEl.getAttribute('url')) ||
            (encEl && /image/.test(encEl.getAttribute('type') || '') && encEl.getAttribute('url')) ||
            (imgMatch && imgMatch[1]) || '';
          const excerpt = stripHtml(get('description') || get('summary') || '').slice(0, 180);
          return { title: get('title'), link, image, date, excerpt };
        }).filter(a => a.title && a.link);
      } catch (e) { return []; }
    }

    async function tryFetch(feedUrl) {
      for (const makeProxy of PROXIES) {
        const ctrl = new AbortController();
        const tid  = setTimeout(() => ctrl.abort(), 9000);
        try {
          const res  = await fetch(makeProxy(feedUrl), { signal: ctrl.signal });
          clearTimeout(tid);
          if (!res.ok) continue;
          const text = await res.text();
          if (text && (text.includes('<item>') || text.includes('<entry>') || text.includes('<rss') || text.includes('<feed'))) {
            return text;
          }
        } catch { clearTimeout(tid); }
      }
      return null;
    }

    async function fetchSource(source) {
      const text = await tryFetch(source.url);
      if (!text) return [];
      return parseRSS(text)
        .map(a => ({ ...a, source: source.name, category: source.category }))
        .filter(isRelevant);
    }

    async function loadAll() {
      const results = await Promise.allSettled(SOURCES.map(fetchSource));
      allArticles = results
        .filter(r => r.status === 'fulfilled')
        .flatMap(r => r.value)
        .sort((a, b) => b.date - a.date)
        .slice(0, 25);

      if (allArticles.length === 0) {
        document.getElementById('carousel-root').innerHTML = `
          <div class="empty-state" style="flex-direction:column;gap:16px;text-align:center;padding:20px">
            <div style="font-size:32px">⚠️</div>
            <div style="color:#82889a">Artikel konnten nicht geladen werden.<br>
              <span style="font-size:12px;color:#c0c4cc">Prüfe deine Internetverbindung.</span>
            </div>
            <button onclick="location.reload()"
              style="padding:8px 20px;border:1.5px solid #00acdc;background:transparent;color:#00acdc;border-radius:20px;cursor:pointer;font-size:13px;font-family:inherit">
              Neu laden
            </button>
          </div>`;
        return;
      }

      applyFilter(activeCat);
    }

    function applyFilter(cat) {
      activeCat        = cat;
      filteredArticles = cat === 'all' ? [...allArticles] : allArticles.filter(a => a.category === cat);
      currentIndex     = 0;
      renderCarousel();
    }

    function fmtDate(d) {
      const h = Math.floor((Date.now() - d) / 3_600_000);
      if (h < 1)  return 'Gerade eben';
      if (h < 24) return `vor ${h} Std.`;
      const days = Math.floor(h / 24);
      if (days < 7) return `vor ${days} Tag${days > 1 ? 'en' : ''}`;
      return d.toLocaleDateString('de-DE', { day: 'numeric', month: 'short' });
    }

    function getPos(idx) {
      const total = filteredArticles.length;
      let diff = idx - currentIndex;
      if (diff >  total / 2) diff -= total;
      if (diff < -total / 2) diff += total;
      if (diff ===  0) return '0';
      if (diff ===  1) return '1';
      if (diff === -1) return '-1';
      if (diff ===  2) return '2';
      if (diff === -2) return '-2';
      return diff > 0 ? 'hidden-right' : 'hidden-left';
    }

    function renderCarousel() {
      const root = document.getElementById('carousel-root');
      if (!filteredArticles.length) {
        root.innerHTML = '<div class="empty-state">Keine Artikel in dieser Kategorie.</div>';
        return;
      }

      const cards = filteredArticles.map((art, i) => {
        const pos   = getPos(i);
        const col   = COLORS[art.category] || COLORS['KI & Tech'];
        const emoji = EMOJI[art.category]  || '📄';
        const imgTag = art.image
          ? `<img class="card-image" src="${escHtml(art.image)}" alt="" loading="lazy"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : '';
        const phStyle = art.image ? 'display:none' : '';

        return `
<a class="card" data-pos="${pos}" data-index="${i}" href="${escHtml(art.link)}" target="_blank" rel="noopener"
   onclick="handleCardClick(event,${i})">
  ${imgTag}
  <div class="card-image-placeholder" style="${phStyle}">${emoji}</div>
  <div class="card-body">
    <div class="card-top-row">
      <span class="card-category" style="background:${col.bg};color:${col.text}">${escHtml(art.category)}</span>
      <span class="card-date">${fmtDate(art.date)}</span>
    </div>
    <div class="card-source">${escHtml(art.source)}</div>
    <h2 class="card-title">${escHtml(art.title)}</h2>
    <div class="card-cta">Weiterlesen &rarr;</div>
  </div>
</a>`;
      }).join('');

      root.innerHTML = `
<div class="carousel-wrapper">
  <button class="nav-arrow nav-prev" aria-label="Zurück" onclick="navigate(-1)">&#8592;</button>
  <div class="carousel-track">${cards}</div>
  <button class="nav-arrow nav-next" aria-label="Weiter" onclick="navigate(1)">&#8594;</button>
</div>`;

      document.getElementById('progress-bar').style.display = 'block';
      startProgress();
      startAuto();
    }

    function updatePositions() {
      document.querySelectorAll('.card').forEach(card => {
        card.dataset.pos = getPos(parseInt(card.dataset.index));
      });
    }

    function navigate(dir) {
      currentIndex = (currentIndex + dir + filteredArticles.length) % filteredArticles.length;
      updatePositions();
      startProgress();
      restartAuto();
    }

    function handleCardClick(e, idx) {
      if (idx !== currentIndex) {
        e.preventDefault();
        currentIndex = idx;
        updatePositions();
        startProgress();
        restartAuto();
      }
    }

    function startAuto()   { clearInterval(autoTimer); autoTimer = setInterval(() => navigate(1), AUTO_SECS * 1000); }
    function restartAuto() { clearInterval(autoTimer); autoTimer = setInterval(() => navigate(1), AUTO_SECS * 1000); }

    function startProgress() {
      const fill = document.getElementById('progress-fill');
      if (!fill) return;
      fill.style.transition = 'none';
      fill.style.width = '0%';
      requestAnimationFrame(() => requestAnimationFrame(() => {
        fill.style.transition = `width ${AUTO_SECS}s linear`;
        fill.style.width = '100%';
      }));
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight') navigate(1);
      if (e.key === 'ArrowLeft')  navigate(-1);
    });

    let _touchX = 0;
    document.addEventListener('touchstart', e => { _touchX = e.touches[0].clientX; });
    document.addEventListener('touchend',   e => {
      const dx = _touchX - e.changedTouches[0].clientX;
      if (Math.abs(dx) > 50) navigate(dx > 0 ? 1 : -1);
    });

    document.getElementById('filters').addEventListener('click', e => {
      const btn = e.target.closest('.filter-btn');
      if (!btn) return;
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      applyFilter(btn.dataset.cat);
    });

    loadAll();
    setInterval(loadAll, 24 * 60 * 60 * 1000);
  </script>
</body>
</html>
